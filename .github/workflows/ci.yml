name: ci

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.7"

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen

      - name: ruff check
        run: uv run ruff check libs apps

      - name: ruff format --check
        run: uv run ruff format --check libs apps

  type:
    name: type
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen

      - name: mypy --strict
        run: uv run mypy --strict

  test:
    name: test (unit)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen

      - name: Run unit tests
        run: uv run pytest -m "not integration" --maxfail=1 --cov=libs --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore

  test-int:
    name: test (integration)
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lens
          POSTGRES_PASSWORD: lens
          POSTGRES_DB: lens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lens -d lens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://lens:lens@localhost:5432/lens
      RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync workspace
        run: uv sync --all-packages --all-groups --frozen

      - name: Run integration tests
        run: uv run pytest -m integration --maxfail=1
        continue-on-error: true
        # Integration tests are empty; allowed to fail (no tests to run)
        # until real ones are added. Switch to required:true once the
        # integration suite has real tests.

  build:
    name: build (images)
    runs-on: ubuntu-latest
    needs: [lint, type, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build base image
        run: docker build -f deploy/docker/base.Dockerfile -t lens-base:latest .
      # Per-role image builds are added when each app's Dockerfile lands
      # (api, workers, ai, cli).
