<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Liquid Glass Light Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#ffebee" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ffcdd2" stop-opacity="0.75" />
    </radialGradient>
    
    <!-- Light Refractive Glass Rim Gradient -->
    <linearGradient id="glass-rim-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="75%" stop-color="#cccccc" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#999999" stop-opacity="0.8" />
    </linearGradient>
    
    <!-- Top reflection highlight (water/glass bubble look) -->
    <linearGradient id="gloss-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    
    <!-- Bottom bezel glow -->
    <linearGradient id="bottom-glow-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    
    <!-- Metallic gradient (Silver) -->
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#a0a0a0" />
      <stop offset="100%" stop-color="#333333" />
    </linearGradient>
    
    <linearGradient id="metal-dark-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#444444" />
      <stop offset="100%" stop-color="#111111" />
    </linearGradient>
    
    <!-- Gold gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff099" />
      <stop offset="50%" stop-color="#e5c158" />
      <stop offset="100%" stop-color="#b28c12" />
    </linearGradient>
    
    <!-- Glass Body fill (frosted white glass texture) -->
    <radialGradient id="prism-body-grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15" />
    </radialGradient>
    
    <!-- Floating disc glass badge gradient -->
    <linearGradient id="plugin-disk-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ffcdd2" stop-opacity="0.45" />
    </linearGradient>
    
    <!-- Ruby Gem Gradient -->
    <radialGradient id="ruby-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff6b81" />
      <stop offset="70%" stop-color="#ff4757" />
      <stop offset="100%" stop-color="#b20021" />
    </radialGradient>
    
    <!-- Camera/Lens glass gradient -->
    <radialGradient id="lens-glass-grad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="40%" stop-color="#00838f" />
      <stop offset="85%" stop-color="#00363a" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    
    <!-- Rainbow / Gauge Gradient -->
    <linearGradient id="rainbow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ed573" />
      <stop offset="60%" stop-color="#ffa502" />
      <stop offset="100%" stop-color="#ff4757" />
    </linearGradient>
    
    <!-- Soft light shadow filter for Drop Shadows (clean grey shadow) -->
    <filter id="shadow-blur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
    
    <!-- Soft blur for Glyph Drop Shadow -->
    <filter id="glyph-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Outer container shadow (soft, low-opacity grey shadow for light style) -->
  <path d="M 256,48 C 380,53 470,138 470,264 C 470,388 375,473 256,478 C 135,473 42,388 42,264 C 42,138 130,53 256,48 Z" fill="#2d3436" opacity="0.16" filter="url(#shadow-blur)" />
  
  <!-- Main Organic Liquid Glass Droplet Container (Frosted glass blend) -->
  <path d="M 256,40 C 380,45 470,130 470,256 C 470,380 375,465 256,470 C 135,465 42,380 42,256 C 42,130 130,45 256,40 Z" fill="url(#bg-grad)" stroke="url(#glass-rim-grad)" stroke-width="4.5" />
  
  <!-- Inner Highlight Glow border (liquid refraction edge) -->
  <path d="M 256,44 C 376,49 462,132 462,256 C 462,376 371,459 256,464 C 139,459 50,376 50,256 C 50,132 136,49 256,44 Z" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-opacity="0.6" />
  
  <!-- Central Abstract Wireframe/High-Contrast Glyph (Suspended inside glass) -->
  
    <!-- Hypercube Wireframe -->
    <g stroke="#c62828" stroke-linejoin="round" stroke-linecap="round" fill="none">
      <!-- Outer Hexagon -->
      <polygon points="256,130 340,178 340,274 256,322 172,274 172,178" stroke-width="3.5" />
      <!-- Inner Hexagon -->
      <polygon points="256,185 305,213 305,267 256,295 207,267 207,213" stroke-width="2" opacity="0.7" />
      
      <!-- Connect vertices -->
      <line x1="256" y1="130" x2="256" y2="185" stroke-width="2" />
      <line x1="340" y1="178" x2="305" y2="213" stroke-width="2" />
      <line x1="340" y1="274" x2="305" y2="267" stroke-width="2" />
      <line x1="256" y1="322" x2="256" y2="295" stroke-width="2" />
      <line x1="172" y1="274" x2="207" y2="267" stroke-width="2" />
      <line x1="172" y1="178" x2="207" y2="213" stroke-width="2" />
    </g>
    <!-- Central ruby bead -->
    <circle cx="256" cy="240" r="16" fill="url(#ruby-grad)" stroke="#fff" stroke-width="1.5" filter="url(#glyph-shadow)" />
        
  
  <!-- iOS 27 Liquid Glass Double Gloss Overlay -->
  <!-- 1. Top primary lens bubble gloss -->
  <path d="M 75,170 C 95,85 170,55 256,52 C 342,55 417,85 437,170 C 310,210 202,210 75,170 Z" fill="url(#gloss-grad)" stroke="none" />
  
  <!-- 2. Bottom reflection/refraction glow -->
  <path d="M 110,430 C 200,455 312,455 402,430 C 312,415 200,415 110,430 Z" fill="url(#bottom-glow-grad)" stroke="none" />
  
  <!-- 3. Specular Glare Dot -->
  <ellipse cx="140" cy="95" rx="35" ry="8" transform="rotate(-30 140 95)" fill="#ffffff" opacity="0.6" />
  <circle cx="120" cy="85" r="3.5" fill="#ffffff" opacity="0.85" />
  
  <!-- Plugin Module Badge -->
  
  <!-- Modern Light Glass Submodule Badge -->
  <g>
    <!-- Floating clear glass base disk -->
    <circle cx="410" cy="102" r="34" fill="url(#plugin-disk-grad)" stroke="#ffffff" stroke-width="2.2" filter="url(#glyph-shadow)" />
    
    <!-- Dark, solid stroke puzzle piece outline -->
    <path d="M 395,91 L 403,91 C 403,82 405,82 410,82 C 415,82 417,82 417,91 L 425,91 L 425,99 C 434,99 434,103 434,107 C 434,111 434,114 425,114 L 425,122 L 417,122 C 417,113 415,113 410,113 C 405,113 403,113 403,122 L 395,122 L 395,114 C 404,114 404,111 404,107 C 404,103 404,99 395,99 Z" 
          fill="none" stroke="#c62828" stroke-width="2.5" stroke-linecap="round" />
  </g>
    
</svg>
